<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 시안 2: 권리금 코인 — "수수료 0, 직거래" -->
  <!-- 테라코타 원형 코인 -->
  <circle cx="32" cy="32" r="28" fill="#D96C4F"/>
  <!-- 코인 내부 테두리 (오목 느낌) -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#FBF8F3" stroke-width="1.5" opacity="0.5"/>

  <!-- 중앙: 집+원화 합성 심볼 -->
  <!-- 지붕 삼각형 (크림) -->
  <polygon points="32,14 46,26 18,26" fill="#FBF8F3"/>
  <!-- 건물 몸체 -->
  <rect x="20" y="26" width="24" height="16" fill="#FBF8F3"/>
  <!-- 문 (그린) -->
  <rect x="27" y="32" width="10" height="10" rx="1.5" fill="#1F3F2E"/>

  <!-- ₩ 기호 대신: 건물 위 작은 원화 획 표시 제거하고 깔끔하게 유지 -->
</svg>