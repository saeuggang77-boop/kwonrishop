name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 실제 프로덕션 빌드는 Vercel이 담당한다.
# CI는 DB/환경변수 없이 가능한 정적 검증(타입체크)만 수행한다.
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
